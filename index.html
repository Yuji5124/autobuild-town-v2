<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オートビルドタウン v2 | つくりたがりの町</title>
  <link rel="stylesheet" href="./style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js" defer></script>
  <script src="./main.js" defer></script>
</head>
<body>
  <main id="app">
    <section id="title-screen" class="title-screen" aria-labelledby="game-title">
      <div class="title-town" aria-hidden="true">
        <span class="mini-block block-a"></span>
        <span class="mini-block block-b"></span>
        <span class="mini-block block-c"></span>
        <span class="mini-block block-d"></span>
        <span class="mini-roof"></span>
      </div>
      <p class="subtitle">つくりたがりの町</p>
      <h1 id="game-title">オートビルドタウン v2</h1>
      <p class="tagline">自分で作っていない町なのに、だんだん自分の町に見えてくる。</p>
      <button id="start-button" class="start-button" type="button">はじめる</button>
    </section>

    <section id="game-screen" class="game-screen is-hidden" aria-label="3Dゲーム画面">
      <div id="scene-container" class="scene-container"></div>

      <div class="hud mode-badge" aria-live="polite">
        <span id="mode-label">外側から見るモード</span>
      </div>

      <div class="hud camera-panel" aria-label="カメラ操作">
        <button id="outside-button" type="button" class="hud-button is-active">外側から見る</button>
        <button id="hero-button" type="button" class="hud-button">主人公目線</button>
        <button id="reset-button" type="button" class="hud-button">カメラをリセット</button>
      </div>

      <div class="hud rain-panel" aria-label="ブロックの雨操作">
        <button id="rain-toggle-button" type="button" class="hud-button is-active">ブロックの雨 ON</button>
        <button id="burst-button" type="button" class="hud-button">少しだけ降らす</button>
        <span class="block-counter" aria-live="polite">ブロック数: <span id="block-count">0</span></span>
      </div>

      <div class="hud worker-panel" aria-label="作業員操作">
        <button id="worker-toggle-button" type="button" class="hud-button is-active">作業員 ON</button>
        <span class="worker-state" aria-live="polite">作業員: <span id="worker-state-label">さがす</span></span>
        <span class="material-counter" aria-live="polite">材料あつまり: <span id="material-count">0</span> / <span id="material-goal">15</span></span>
      </div>

      <div id="worker-speech" class="worker-speech" aria-hidden="true"></div>

      <div id="hero-controls" class="hud hero-controls is-hidden" aria-live="polite">
        W/S: 前後　A/D: 向きを変える　/　矢印キーでも歩けます
      </div>

      <div id="hero-observe" class="hud hero-observe is-hidden" aria-label="観察">
        <span class="nearby-spot">近くの場所: <span id="nearby-spot">なし</span></span>
        <button id="look-button" type="button" class="hud-button">ながめる</button>
      </div>

      <div id="hero-touch" class="hud hero-touch is-hidden" aria-label="主人公の移動">
        <button id="hero-touch-forward" class="touch-button" type="button" aria-label="前に進む">前</button>
        <div class="touch-row">
          <button id="hero-touch-left" class="touch-button" type="button" aria-label="左を向く">左</button>
          <button id="hero-touch-back" class="touch-button" type="button" aria-label="後ろに下がる">後</button>
          <button id="hero-touch-right" class="touch-button" type="button" aria-label="右を向く">右</button>
        </div>
      </div>

      <div class="hud message-window" aria-live="polite">
        <p id="message-text">落ちてきた材料に、作業員たちが気づきはじめた。</p>
      </div>
    </section>
  </main>
</body>
</html>
